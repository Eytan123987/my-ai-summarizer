<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudy ULTIMATE | Unlimited AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Assistant', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .premium-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #3b82f6; }
        .btn-pay { background: linear-gradient(90deg, #f59e0b, #ef4444); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen">

    <div class="bg-blue-600 py-1.5 text-center text-[11px] font-black uppercase tracking-[0.2em]">
        🔓 Unlimited Access Enabled - גרסת המפתחים ללא הגבלה
    </div>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black text-2xl shadow-lg">S</div>
            <h1 class="text-2xl font-black italic">SMART<span class="text-blue-500">STUDY</span></h1>
        </div>
        <div id="userProfile" class="flex gap-4"></div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pt-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-3 space-y-6">
            <div class="glass p-6 rounded-3xl premium-card">
                <h3 class="text-xl font-black text-yellow-500 mb-2">SmartStudy GOLD 👑</h3>
                <p class="text-xs text-slate-400 mb-4">תמוך במפתח וקבל גישה לשרתים הכי מהירים בעולם.</p>
                <button onclick="payNow()" class="w-full btn-pay text-white font-black py-3 rounded-xl shadow-lg shadow-orange-500/20">
                    שדרג עכשיו - ₪19.90
                </button>
            </div>
            
            <div class="glass p-5 rounded-2xl border-white/5">
                <h4 class="font-bold text-sm mb-3">סטטוס מנוי:</h4>
                <div class="flex items-center gap-2 text-green-400 text-sm">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-ping"></span>
                    מחובר (ללא הגבלה)
                </div>
            </div>
        </div>

        <div class="lg:col-span-9 space-y-6">
            <div id="appContainer" class="glass p-8 rounded-[2.5rem] relative overflow-hidden">
                <div id="lockOverlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-950/90 backdrop-blur-md rounded-[2.5rem]">
                    <h2 class="text-3xl font-black mb-6 text-center">מוכן ללמוד כמו מקצוען?</h2>
                    <button onclick="login()" class="bg-blue-600 hover:bg-blue-500 px-10 py-4 rounded-full font-black text-lg transition shadow-2xl">
                        התחבר עם Google
                    </button>
                </div>

                <div class="flex justify-between items-center mb-6">
                    <span class="text-xs font-bold text-slate-500">POWERED BY GEMINI 2.0 AI</span>
                    <span class="text-xs bg-white/10 px-3 py-1 rounded-full text-blue-300">Unlimited Credits</span>
                </div>

                <textarea id="userInput" class="w-full h-64 bg-white/5 border border-white/10 rounded-3xl p-6 text-white text-lg focus:border-blue-500 outline-none transition-all mb-6 resize-none" placeholder="הדבק כאן את הטקסט שלך..."></textarea>
                
                <button id="mainBtn" onclick="processAI()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-6 rounded-2xl text-2xl shadow-xl transition-all">
                    צור סיכום חבילה מלאה 🚀
                </button>
            </div>

            <div id="resultArea" class="hidden space-y-4">
                <div class="glass p-8 rounded-[2.5rem] border-r-4 border-blue-500 relative">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold text-blue-400 italic">הסיכום המוכן</h3>
                        <div class="flex gap-3">
                            <button onclick="speakText()" class="hover:scale-110 transition">🔊</button>
                            <button onclick="copyText()" class="hover:scale-110 transition">📋</button>
                        </div>
                    </div>
                    <div id="summaryOutput" class="text-slate-200 text-lg leading-relaxed"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABZLTWaBJ6-i3cMQ7m9z5NavlSPjcfjDE",
            authDomain: "smartstudy-445f5.firebaseapp.com",
            projectId: "smartstudy-445f5",
            storageBucket: "smartstudy-445f5.firebasestorage.app",
            messagingSenderId: "970794059408",
            appId: "1:970794059408:web:9ba84746eedaf761f73a15"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        function login() { auth.signInWithPopup(provider); }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            const overlay = document.getElementById('lockOverlay');
            const profile = document.getElementById('userProfile');
            if (user) {
                overlay.classList.add('hidden');
                profile.innerHTML = `
                    <div class="flex items-center gap-3 bg-white/5 p-1 pr-4 rounded-full border border-white/10">
                        <span class="text-sm font-bold">${user.displayName.split(' ')[0]}</span>
                        <img src="${user.photoURL}" class="w-8 h-8 rounded-full">
                        <button onclick="logout()" class="text-[10px] text-slate-500 px-2">צא</button>
                    </div>
                `;
            } else {
                overlay.classList.remove('hidden');
                profile.innerHTML = `<button onclick="login()" class="bg-blue-600 px-6 py-2 rounded-full font-bold">התחבר</button>`;
            }
        });

        async function processAI() {
            const text = document.getElementById('userInput').value;
            if (!text) return alert("הזן טקסט");
            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            btn.innerText = "ה-AI יוצר קסם... ✨";
            
            try {
                const response = await fetch('https://my-smart-study.onrender.com/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const data = await response.json();
                document.getElementById('resultArea').classList.remove('hidden');
                let formatted = data.summary.replace(/\*\*(.*?)\*\*/g, '<b class="text-blue-400">$1</b>');
                document.getElementById('summaryOutput').innerHTML = formatted.replace(/\n/g, '<br>');
                document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                alert("השרת מתעורר... נסה שוב בעוד 10 שניות");
            } finally {
                btn.disabled = false;
                btn.innerText = "צור סיכום חבילה מלאה 🚀";
            }
        }

        function payNow() {
            alert("העברה מאובטחת ל-PayPal... (בגרסה הבאה נחבר את הסליקה האמיתית)");
        }

        function speakText() {
            const msg = new SpeechSynthesisUtterance(document.getElementById('summaryOutput').innerText);
            msg.lang = 'he-IL';
            window.speechSynthesis.speak(msg);
        }

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('summaryOutput').innerText);
            alert("הועתק!");
        }
    </script>
</body>
</html>
