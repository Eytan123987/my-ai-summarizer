<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudy Ultimate PRO | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script type="importmap">
        { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .premium-btn { background: linear-gradient(90deg, #f59e0b, #ef4444); transition: 0.3s; }
        #paymentPage { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <div id="paymentPage" class="fixed inset-0 z-[100] bg-slate-950/98 flex items-center justify-center p-6" style="display:none;">
        <div class="glass max-w-md w-full p-8 text-center border-2 border-amber-500 shadow-2xl">
            <h2 class="text-3xl font-bold text-amber-500 mb-4">SmartStudy GOLD 👑</h2>
            <button onclick="closePayment()" class="w-full premium-btn py-4 rounded-xl font-bold text-white">שדרג עכשיו</button>
            <button onclick="closePayment()" class="mt-4 text-slate-500 underline block w-full">סגור</button>
        </div>
    </div>

    <nav class="p-6 border-b border-white/5 flex justify-between items-center bg-slate-950/90 sticky top-0 z-50">
        <h1 class="text-2xl font-black italic bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent uppercase">SmartStudy PRO</h1>
        <div id="authArea">
            <button id="loginBtn" onclick="login()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full font-bold transition shadow-lg">התחבר עם Google</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <aside class="lg:col-span-3 space-y-4">
            <div class="glass p-6">
                <h4 class="font-bold text-blue-400 mb-4 italic italic">כלים פעילים</h4>
                <div class="space-y-3">
                    <button onclick="speakText()" class="w-full p-4 bg-slate-800 hover:bg-slate-700 rounded-xl text-right flex items-center gap-3">🔊 הקראת סיכום</button>
                    <button onclick="runAI('translate')" class="w-full p-4 bg-slate-800 hover:bg-slate-700 rounded-xl text-right flex items-center gap-3">🌍 תרגום לאנגלית</button>
                    <button onclick="runAI('quiz')" class="w-full p-4 bg-blue-900/40 border border-blue-500/50 rounded-xl text-right flex items-center gap-3 font-bold">🎯 בוחן פתע</button>
                    <button onclick="openPayment()" class="w-full p-4 premium-btn rounded-xl text-right flex items-center gap-3 font-bold text-white">👑 גרסת זהב</button>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-9 space-y-6">
            <div class="glass p-8 shadow-2xl">
                <textarea id="userInput" class="w-full h-64 bg-transparent border-none text-xl outline-none placeholder-slate-700 resize-none" placeholder="הדבק כאן את החומר..."></textarea>
                <div class="flex justify-between items-center mt-6 border-t border-white/5 pt-6">
                    <div id="status" class="text-slate-500 text-sm italic">מערכת AI מוכנה</div>
                    <button id="mainBtn" onclick="runAI('summarize')" class="bg-gradient-to-r from-blue-600 to-emerald-500 px-12 py-5 rounded-2xl font-black text-lg shadow-xl hover:scale-105 transition">סכם עכשיו ✨</button>
                </div>
            </div>

            <div id="resultBox" class="hidden glass p-8 border-r-8 border-emerald-500">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-bold text-emerald-400 italic italic">התוצאה:</h3>
                    <button onclick="copyText()" class="bg-slate-800 px-4 py-2 rounded-lg text-sm text-white">העתק 📋</button>
                </div>
                <div id="output" class="text-slate-200 text-lg leading-relaxed whitespace-pre-wrap"></div>
            </div>
        </section>
    </main>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        const firebaseConfig = {
            apiKey: "AIzaSyBqQW0MassV2A1zgAuNPmGGgrTbujaw9PI",
            authDomain: "smartstudy-445f5.firebaseapp.com",
            projectId: "smartstudy-445f5",
            storageBucket: "smartstudy-445f5.firebasestorage.app",
            messagingSenderId: "970794059408",
            appId: "1:970794059408:web:896c21a0f82312d8a70597"
        };
        firebase.initializeApp(firebaseConfig);

        const genAI = new GoogleGenerativeAI("AIzaSyBqQW0MassV2A1zgAuNPmGGgrTbujaw9PI");
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        let user = null;

        // מנגנון זיהוי משתמש - עובד גם אחרי ה-Redirect של גוגל
        firebase.auth().onAuthStateChanged((u) => {
            if (u) {
                user = u;
                document.getElementById('authArea').innerHTML = `
                    <div class="flex items-center gap-3 bg-white/5 p-1 pr-4 rounded-full border border-white/10">
                        <span class="text-sm font-bold text-emerald-400 italic">${user.displayName}</span>
                        <img src="${user.photoURL}" class="w-10 h-10 rounded-full border-2 border-blue-500">
                    </div>`;
                document.getElementById('status').innerText = "מחובר: " + user.displayName;
            }
        });

        // פונקציית ההתחברות החדשה - לא נסגרת לעולם!
        window.login = function() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // משתמשים ב-Redirect כדי למנוע את החלון שנסגר מייד
            firebase.auth().signInWithRedirect(provider);
        };

        window.runAI = async function(type) {
            if (!user) return alert("חובה להתחבר עם המייל קודם!");
            const text = document.getElementById('userInput').value;
            if (!text) return alert("הכנס טקסט!");

            const status = document.getElementById('status');
            const output = document.getElementById('output');
            const resultBox = document.getElementById('resultBox');

            status.innerHTML = `<span class="animate-pulse text-blue-400 font-bold italic">ה-AI בשיא העבודה...</span>`;
            resultBox.classList.remove('hidden');
            output.innerText = "מעבד...";

            let prompt = `תסכם בנקודות ברורות בעברית: ${text}`;
            if(type === 'quiz') prompt = `צור בוחן אמריקאי עם 4 שאלות על: ${text}`;
            if(type === 'translate') prompt = `Translate to professional English: ${text}`;

            try {
                const result = await model.generateContent(prompt);
                const response = await result.response;
                output.innerHTML = response.text().replace(/\*\*(.*?)\*\*/g, '<b class="text-blue-400">$1</b>');
                status.innerHTML = `<span class="text-emerald-500 font-bold">✅ הושלם!</span>`;
                resultBox.scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                output.innerText = "שגיאה בחיבור ל-AI.";
            }
        };

        window.speakText = () => {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(document.getElementById('output').innerText);
            msg.lang = 'he-IL';
            window.speechSynthesis.speak(msg);
        };

        window.openPayment = () => document.getElementById('paymentPage').style.display = 'flex';
        window.closePayment = () => document.getElementById('paymentPage').style.display = 'none';
        window.copyText = () => { navigator.clipboard.writeText(document.getElementById('output').innerText); alert("הועתק!"); };
    </script>
</body>
</html>
