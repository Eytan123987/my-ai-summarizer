<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudy PRO | AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: system-ui, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-gradient { background: linear-gradient(90deg, #3b82f6, #2dd4bf); transition: all 0.3s ease; }
        .btn-gradient:disabled { background: #334155; cursor: not-allowed; transform: none; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="p-6 border-b border-white/10 flex justify-between items-center max-w-6xl mx-auto">
        <h1 class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-teal-400">SMARTSTUDY PRO</h1>
        <div id="userProfile">
            <button onclick="login()" class="bg-blue-600 px-5 py-2 rounded-full text-sm font-bold transition">התחבר עם Google</button>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 pt-16">
        <div class="text-center mb-8">
            <h2 class="text-4xl font-extrabold mb-4">סיכום חכם ב-AI</h2>
            <div id="usageCounter" class="inline-block bg-white/10 px-4 py-1 rounded-full text-sm text-blue-300">
                נותרו לך עוד <span id="remainingCredits">5</span> סיכומים להיום
            </div>
        </div>

        <div id="appContainer" class="glass p-8 rounded-[2rem] shadow-2xl relative opacity-50 pointer-events-none">
            <div id="lockOverlay" class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-slate-900/60 backdrop-blur-sm rounded-[2rem]">
                <span class="text-4xl mb-2">🔒</span>
                <p class="font-bold">התחבר כדי להתחיל ללמוד</p>
            </div>

            <textarea id="userInput" class="w-full h-48 bg-white/5 border border-white/10 rounded-2xl p-4 text-white placeholder-slate-500 focus:border-blue-500 outline-none mb-6" placeholder="הדבק כאן את החומר..."></textarea>
            
            <button id="mainBtn" onclick="processAI()" class="w-full btn-gradient text-white font-black py-5 rounded-2xl text-xl uppercase">
                צור סיכום ובוחן ✨
            </button>
        </div>

        <div id="resultArea" class="hidden mt-10 glass p-8 rounded-3xl border-l-4 border-blue-500">
            <div id="summaryOutput" class="text-slate-200 text-lg leading-relaxed"></div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABZLTWaBJ6-i3cMQ7m9z5NavlSPjcfjDE",
            authDomain: "smartstudy-445f5.firebaseapp.com",
            projectId: "smartstudy-445f5",
            storageBucket: "smartstudy-445f5.firebasestorage.app",
            messagingSenderId: "970794059408",
            appId: "1:970794059408:web:9ba84746eedaf761f73a15"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // פונקציות ניהול מונה (Credits)
        function getCredits() {
            const today = new Date().toDateString();
            const data = JSON.parse(localStorage.getItem('study_credits') || '{}');
            if (data.date !== today) return 5;
            return data.count;
        }

        function useCredit() {
            const today = new Date().toDateString();
            const current = getCredits();
            localStorage.setItem('study_credits', JSON.stringify({ date: today, count: current - 1 }));
            updateUI();
        }

        function updateUI() {
            const credits = getCredits();
            document.getElementById('remainingCredits').innerText = credits;
            if (credits <= 0) {
                const btn = document.getElementById('mainBtn');
                btn.disabled = true;
                btn.innerText = "נגמרו הסיכומים להיום ✋";
            }
        }

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => alert("שגיאה בהתחברות: " + e.message));
        }

        auth.onAuthStateChanged(user => {
            const container = document.getElementById('appContainer');
            const overlay = document.getElementById('lockOverlay');
            const profile = document.getElementById('userProfile');

            if (user) {
                container.classList.remove('opacity-50', 'pointer-events-none');
                overlay.classList.add('hidden');
                profile.innerHTML = `<div class="flex items-center gap-2"><img src="${user.photoURL}" class="w-8 h-8 rounded-full border border-blue-500"><span>${user.displayName.split(' ')[0]}</span></div>`;
                updateUI();
            } else {
                container.classList.add('opacity-50', 'pointer-events-none');
                overlay.classList.remove('hidden');
            }
        });

        async function processAI() {
            if (getCredits() <= 0) return;

            const textInput = document.getElementById('userInput').value;
            const btn = document.getElementById('mainBtn');
            const summaryOutput = document.getElementById('summaryOutput');
            const resultArea = document.getElementById('resultArea');

            if (!textInput) return;

            btn.disabled = true;
            btn.innerText = "מעבד נתונים... ⚡";
            resultArea.classList.remove('hidden');
            summaryOutput.innerHTML = "ה-AI כותב בשבילך...";

            try {
                const response = await fetch('https://my-smart-study.onrender.com/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textInput })
                });
                const data = await response.json();
                
                let cleanText = data.summary.replace(/\*\*(.*?)\*\*/g, '<b class="text-blue-400">$1</b>');
                summaryOutput.innerHTML = cleanText.replace(/\n/g, '<br>');
                
                useCredit(); // הורדת נקודת סיכום
                
            } catch (e) {
                summaryOutput.innerHTML = "שגיאה. וודא שהשרת ב-Render רץ.";
            } finally {
                if (getCredits() > 0) {
                    btn.disabled = false;
                    btn.innerText = "צור סיכום ובוחן ✨";
                }
            }
        }
    </script>
</body>
</html>
