<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudy PRO | AI Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-gradient { background: linear-gradient(90deg, #3b82f6, #2dd4bf); transition: all 0.3s ease; }
        .btn-gradient:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.5); }
        .btn-gradient:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto border-b border-white/10">
        <h1 class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-teal-400">SMARTSTUDY PRO</h1>
        <div id="userProfile">
            <div class="animate-pulse bg-white/10 w-24 h-8 rounded-full"></div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 pt-12">
        <div class="text-center mb-10">
            <h2 class="text-4xl font-extrabold mb-4">העתיד של הלמידה כבר כאן</h2>
            <div id="usageStats" class="hidden inline-flex items-center gap-2 bg-blue-500/10 border border-blue-500/20 px-4 py-1.5 rounded-full text-sm text-blue-300">
                <span>נותרו לך</span>
                <span id="remainingCredits" class="font-bold text-white">5</span>
                <span>סיכומים להיום</span>
            </div>
        </div>

        <div id="appContainer" class="glass p-8 rounded-[2.5rem] shadow-2xl relative transition-all duration-500 opacity-50 pointer-events-none">
            <div id="lockOverlay" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-md rounded-[2.5rem]">
                <div class="bg-white/10 p-4 rounded-full mb-4">🔒</div>
                <p class="text-xl font-bold mb-4 text-center">התחבר עם גוגל <br> כדי לפתוח את ה-AI</p>
                <button onclick="login()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-full font-black transition transform active:scale-95 shadow-xl">
                    התחבר עכשיו
                </button>
            </div>

            <label class="block text-sm font-medium text-slate-400 mb-2 mr-2">הדבק חומר לימודי:</label>
            <textarea id="userInput" class="w-full h-56 bg-white/5 border border-white/10 rounded-2xl p-5 text-white placeholder-slate-600 focus:border-blue-500 outline-none transition-all mb-6 resize-none" placeholder="למשל: דברי הסבר על המהפכה הצרפתית..."></textarea>
            
            <button id="mainBtn" onclick="processAI()" class="w-full btn-gradient text-white font-black py-5 rounded-2xl text-xl uppercase tracking-widest shadow-lg">
                צור סיכום ובוחן ✨
            </button>
        </div>

        <div id="resultArea" class="hidden mt-10">
            <div class="glass p-8 rounded-[2rem] border-r-4 border-blue-500 relative">
                <button onclick="copyText()" class="absolute top-6 left-6 text-xs bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg transition">העתק 📋</button>
                <h3 class="text-blue-400 font-bold mb-4 uppercase tracking-tighter">התוצאה המוכנה:</h3>
                <div id="summaryOutput" class="text-slate-200 text-lg leading-relaxed space-y-4"></div>
            </div>
        </div>
    </main>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyABZLTWaBJ6-i3cMQ7m9z5NavlSPjcfjDE",
            authDomain: "smartstudy-445f5.firebaseapp.com",
            projectId: "smartstudy-445f5",
            storageBucket: "smartstudy-445f5.firebasestorage.app",
            messagingSenderId: "970794059408",
            appId: "1:970794059408:web:9ba84746eedaf761f73a15"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // Credit System
        function getCredits() {
            const today = new Date().toDateString();
            const data = JSON.parse(localStorage.getItem('user_credits') || '{}');
            if (data.date !== today) return 5;
            return data.count;
        }

        function useCredit() {
            const today = new Date().toDateString();
            const current = getCredits();
            localStorage.setItem('user_credits', JSON.stringify({ date: today, count: current - 1 }));
            updateCreditUI();
        }

        function updateCreditUI() {
            const count = getCredits();
            document.getElementById('remainingCredits').innerText = count;
            if (count <= 0) {
                const btn = document.getElementById('mainBtn');
                btn.disabled = true;
                btn.innerText = "נגמרה המכסה להיום ✋";
            }
        }

        // Auth Functions
        function login() {
            auth.signInWithPopup(provider).catch(err => {
                alert("שגיאה: וודא שהוספת את eytan123987.github.io ב-Firebase Settings.");
            });
        }

        function logout() {
            auth.signOut();
        }

        auth.onAuthStateChanged(user => {
            const container = document.getElementById('appContainer');
            const overlay = document.getElementById('lockOverlay');
            const profile = document.getElementById('userProfile');
            const stats = document.getElementById('usageStats');

            if (user) {
                container.classList.remove('opacity-50', 'pointer-events-none');
                overlay.classList.add('hidden');
                stats.classList.remove('hidden');
                profile.innerHTML = `
                    <div class="flex items-center gap-3 bg-white/5 p-1 pr-4 rounded-full border border-white/10">
                        <span class="text-sm font-bold">${user.displayName.split(' ')[0]}</span>
                        <img src="${user.photoURL}" class="w-8 h-8 rounded-full border border-blue-500">
                        <button onclick="logout()" class="text-[10px] text-slate-500 hover:text-red-400 px-2">צא</button>
                    </div>
                `;
                updateCreditUI();
            } else {
                container.classList.add('opacity-50', 'pointer-events-none');
                overlay.classList.remove('hidden');
                stats.classList.add('hidden');
                profile.innerHTML = `<button onclick="login()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full text-sm font-bold transition shadow-lg shadow-blue-500/20">התחברות</button>`;
            }
        });

        async function processAI() {
            if (getCredits() <= 0) return;
            const textInput = document.getElementById('userInput').value;
            if (!textInput) return alert("אנא הזן טקסט");

            const btn = document.getElementById('mainBtn');
            const output = document.getElementById('summaryOutput');
            const resultArea = document.getElementById('resultArea');

            btn.disabled = true;
            btn.innerHTML = `מעבד נתונים... <span class="inline-block animate-spin mr-2">⏳</span>`;
            resultArea.classList.remove('hidden');
            output.innerHTML = "ה-AI יוצר עבורך סיכום מעמיק...";

            try {
                const response = await fetch('https://my-smart-study.onrender.com/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textInput })
                });
                const data = await response.json();
                
                let formatted = data.summary.replace(/\*\*(.*?)\*\*/g, '<b class="text-blue-400">$1</b>');
                output.innerHTML = formatted.replace(/\n/g, '<br>');
                
                useCredit();
                resultArea.scrollIntoView({ behavior: 'smooth' });

            } catch (e) {
                output.innerHTML = "שגיאה בתקשורת עם השרת. וודא שה-Backend ב-Render עובד.";
            } finally {
                if (getCredits() > 0) {
                    btn.disabled = false;
                    btn.innerText = "צור סיכום ובוחן ✨";
                }
            }
        }

        function copyText() {
            const text = document.getElementById('summaryOutput').innerText;
            navigator.clipboard.writeText(text);
            alert("הועתק בהצלחה!");
        }
    </script>
</body>
</html>
