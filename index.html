<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudy PRO | AI Learning Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #3b82f6, #2dd4bf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .shimmer { position: relative; overflow: hidden; }
        .shimmer::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); animation: shine 2s infinite; }
        @keyframes shine { 100% { left: 200%; } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <h1 class="text-3xl font-extrabold gradient-text italic">SmartStudy PRO</h1>
        <div id="authArea">
            <button onclick="login()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-full font-bold transition shadow-lg shadow-blue-500/20">התחבר עם Google</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pt-10">
        <div class="text-center mb-12">
            <h2 class="text-5xl font-bold mb-4">ללמוד חכם יותר, <span class="text-teal-400">לא קשה יותר.</span></h2>
            <p class="text-slate-400 text-lg">פלטפורמת ה-AI המתקדמת לסיכום תכנים לימודיים ויצירת בחנים בשניות.</p>
        </div>

        <div class="glass p-8 rounded-3xl shadow-2xl mb-10">
            <div class="flex gap-4 mb-4">
                <select id="summaryLevel" class="bg-slate-800 border-none text-white rounded-lg px-4 py-2 outline-none cursor-pointer hover:bg-slate-700">
                    <option value="standard">סיכום סטנדרטי</option>
                    <option value="brief">סיכום קצר וקולע</option>
                    <option value="detailed">סיכום מפורט ומעמיק</option>
                </select>
                <div class="flex-1"></div>
            </div>

            <textarea id="userInput" class="w-full h-56 bg-transparent border-2 border-slate-700 rounded-2xl p-4 text-white placeholder-slate-500 focus:border-blue-500 outline-none transition-all" placeholder="הדבק כאן את החומר מהשיעור, מהספר או מהמצגת..."></textarea>
            
            <button id="mainBtn" onclick="processAI()" class="w-full mt-6 bg-gradient-to-r from-blue-600 to-teal-500 text-white font-bold py-5 rounded-2xl text-xl shadow-xl hover:scale-[1.02] transition-all disabled:opacity-50 shimmer">
                צור קסם לימודי ✨
            </button>
        </div>

        <div id="resultArea" class="hidden space-y-8 pb-20">
            <div class="glass p-8 rounded-3xl border-r-8 border-blue-500">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-bold text-blue-400 italic">הסיכום שלך</h3>
                    <button onclick="copyText()" class="text-sm bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg transition">העתק 📋</button>
                </div>
                <div id="summaryOutput" class="text-slate-200 text-lg leading-relaxed space-y-4"></div>
            </div>
        </div>
    </main>

    <script>
        // דמה של התחברות (בשלב הבא נחבר Firebase אמיתי)
        let isLoggedIn = false;

        function login() {
            // כאן יבוא הקוד של Firebase. כרגע זה מדמה התחברות.
            isLoggedIn = true;
            document.getElementById('authArea').innerHTML = `
                <div class="flex items-center gap-4">
                    <span class="text-teal-400 font-bold">ברוך הבא, תלמיד! 👋</span>
                    <button onclick="location.reload()" class="text-slate-400 text-sm hover:underline">התנתק</button>
                </div>
            `;
        }

        async function processAI() {
            if (!isLoggedIn) {
                alert("חובה להתחבר עם המייל כדי להשתמש ב-PRO!");
                return;
            }

            const textInput = document.getElementById('userInput').value;
            const level = document.getElementById('summaryLevel').value;
            const btn = document.getElementById('mainBtn');
            const resultArea = document.getElementById('resultArea');
            const summaryOutput = document.getElementById('summaryOutput');

            if (!textInput) return alert("נא להזין טקסט");

            btn.disabled = true;
            btn.innerText = "ה-AI של SmartStudy מנתח... 🧠";
            resultArea.classList.remove('hidden');
            summaryOutput.innerHTML = `<div class="animate-pulse flex space-x-4"><div class="flex-1 space-y-6 py-1"><div class="h-2 bg-slate-700 rounded"></div><div class="h-2 bg-slate-700 rounded"></div></div></div>`;

            try {
                const response = await fetch('https://my-smart-study.onrender.com/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textInput, level: level })
                });

                const data = await response.json();
                
                // עיצוב יפה לטקסט
                let text = data.summary.replace(/\*\*(.*?)\*\*/g, '<b class="text-white font-bold">$1</b>');
                text = text.replace(/-/g, '<br>•'); // הופך קווים לבולטים יפים
                
                summaryOutput.innerHTML = text;
                resultArea.scrollIntoView({ behavior: 'smooth' });
                
            } catch (error) {
                summaryOutput.innerText = "שגיאה בתקשורת. נסה שוב בעוד כמה שניות.";
            } finally {
                btn.disabled = false;
                btn.innerText = "צור קסם לימודי ✨";
            }
        }

        function copyText() {
            const text = document.getElementById('summaryOutput').innerText;
            navigator.clipboard.writeText(text);
            alert("הועתק ללוח!");
        }
    </script>
</body>
</html>
