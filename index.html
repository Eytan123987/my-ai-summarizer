<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudy Bagrut ULTIMATE | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Assistant', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .gradient-text { background: linear-gradient(90deg, #60a5fa, #2dd4bf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-dark { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; color: white; outline: none; transition: 0.3s; }
        .input-dark:focus { border-color: #3b82f6; background: rgba(255,255,255,0.08); }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #0891b2); transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px rgba(37, 99, 235, 0.5); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 border-b border-white/5 flex justify-between items-center max-w-7xl mx-auto">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black text-2xl shadow-lg">S</div>
            <h1 class="text-3xl font-black gradient-text tracking-tighter">SmartStudy</h1>
        </div>
        <div id="userArea"></div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <aside class="lg:col-span-3 space-y-6">
            <div class="glass p-6 rounded-3xl border-blue-500/20 shadow-xl">
                <h4 class="font-bold text-blue-400 mb-4 flex items-center gap-2">📊 מחשבון 30/70</h4>
                <div class="space-y-3">
                    <input type="number" id="magenScore" class="input-dark w-full text-center" placeholder="ציון מגן">
                    <input type="number" id="examScore" class="input-dark w-full text-center" placeholder="ציון בחינה">
                    <button onclick="calcScore()" class="w-full bg-blue-600/20 text-blue-400 py-2 rounded-xl font-bold border border-blue-500/30 hover:bg-blue-600 hover:text-white transition">חשב סופי</button>
                    <div id="finalScoreResult" class="text-center font-black text-3xl text-white mt-2"></div>
                </div>
            </div>

            <div class="glass p-6 rounded-3xl border-yellow-500/20 text-center shadow-xl">
                <p class="text-xs text-yellow-500 font-bold mb-2">מצב ריכוז (פומודורו)</p>
                <div id="pomoDisplay" class="text-3xl font-black mb-4 tracking-widest">25:00</div>
                <button id="pomoBtn" onclick="togglePomo()" class="bg-yellow-500 text-black px-6 py-2 rounded-full text-xs font-black uppercase tracking-wider">הפעל</button>
            </div>
        </aside>

        <div class="lg:col-span-9 space-y-6">
            <section id="appBox" class="glass p-8 rounded-[2.5rem] relative overflow-hidden border-white/10 shadow-2xl">
                <div id="lockOverlay" class="absolute inset-0 z-50 flex items-center justify-center bg-slate-950/95 backdrop-blur-xl rounded-[2.5rem]">
                    <button onclick="login()" class="btn-primary px-12 py-5 rounded-2xl font-black text-xl shadow-2xl">התחברות מאובטחת</button>
                </div>

                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">System Ready - Unlimited</span>
                    </div>
                </div>

                <textarea id="userInput" class="w-full h-72 bg-white/5 border border-white/10 rounded-3xl p-6 text-white text-lg focus:border-blue-500/50 outline-none transition-all mb-6 resize-none shadow-inner" placeholder="הדבק כאן סיכומים, פרקים מספרים או שאלות..."></textarea>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button id="mainBtn" onclick="processAI('summary')" class="btn-primary text-white font-black py-5 rounded-2xl text-xl">סכם לי הכל ✨</button>
                    <button id="quizBtn" onclick="processAI('quiz')" class="bg-slate-800 hover:bg-slate-700 text-white font-black py-5 rounded-2xl text-xl border border-white/10 transition-all">צור שאלות תרגול ✍️</button>
                </div>
            </section>

            <div id="resultArea" class="hidden glass p-8 rounded-[2.5rem] border-r-8 border-blue-600 relative animate-in fade-in slide-in-from-bottom-4 duration-500 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-black text-blue-400 italic">התוצאה המוכנה:</h3>
                    <div class="flex gap-4">
                        <button onclick="speakText()" class="text-2xl hover:scale-110 transition">🔊</button>
                        <button onclick="copyText()" class="text-2xl hover:scale-110 transition">📋</button>
                    </div>
                </div>
                <div id="summaryOutput" class="text-slate-200 text-lg leading-relaxed space-y-4"></div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABZLTWaBJ6-i3cMQ7m9z5NavlSPjcfjDE",
            authDomain: "smartstudy-445f5.firebaseapp.com",
            projectId: "smartstudy-445f5",
            storageBucket: "smartstudy-445f5.firebasestorage.app",
            messagingSenderId: "970794059408",
            appId: "1:970794059408:web:9ba84746eedaf761f73a15"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // Wake up Render server on load
        window.addEventListener('load', () => {
            fetch('https://my-smart-study.onrender.com/summarize', { method: 'OPTIONS' }).catch(() => {});
        });

        function login() { auth.signInWithPopup(provider); }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            const overlay = document.getElementById('lockOverlay');
            const userArea = document.getElementById('userArea');
            if (user) {
                overlay.classList.add('hidden');
                userArea.innerHTML = `<div class="flex items-center gap-3 bg-white/5 p-1 pr-4 rounded-full border border-white/10"><span class="text-sm font-bold text-blue-400">${user.displayName.split(' ')[0]}</span><img src="${user.photoURL}" class="w-8 h-8 rounded-full border-2 border-blue-500"><button onclick="logout()" class="text-xs text-slate-500 px-2 hover:text-red-400 transition">צא</button></div>`;
            } else {
                overlay.classList.remove('hidden');
                userArea.innerHTML = `<button onclick="login()" class="bg-blue-600 px-6 py-2 rounded-full font-bold shadow-lg shadow-blue-500/20">כניסה</button>`;
            }
        });

        // Smart Retry Logic - ינסה 5 פעמים עם המתנה הולכת וגדלה
        async function smartFetch(url, body, mode) {
            let attempt = 0;
            const maxAttempts = 5;
            
            while (attempt < maxAttempts) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (response.ok) return await response.json();
                } catch (e) {
                    attempt++;
                    console.log(`ניסיון ${attempt} נכשל, מעורר שרת...`);
                    // מחכה יותר זמן בכל ניסיון
                    await new Promise(r => setTimeout(r, attempt * 3000)); 
                }
            }
            throw new Error("Server Timeout");
        }

        async function processAI(mode) {
            const text = document.getElementById('userInput').value;
            if (!text) return alert("הזן טקסט קודם");

            const btn = (mode === 'summary') ? document.getElementById('mainBtn') : document.getElementById('quizBtn');
            const output = document.getElementById('summaryOutput');
            const resultArea = document.getElementById('resultArea');
            const originalText = btn.innerText;

            btn.disabled = true;
            btn.innerText = "מעיר את השרת (זה יקרה רק פעם אחת)... 🚀";
            resultArea.classList.remove('hidden');
            output.innerHTML = "ה-AI בדרך! אנחנו דופקים על הדלת של השרת עד שהוא יפתח...";

            try {
                const data = await smartFetch('https://my-smart-study.onrender.com/summarize', { text, mode });
                let formatted = data.summary.replace(/\*\*(.*?)\*\*/g, '<b class="text-blue-400 font-bold">$1</b>');
                output.innerHTML = formatted.replace(/\n/g, '<br>');
                resultArea.scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                output.innerHTML = "אוף, השרת עדיין לא קם. נסה ללחוץ שוב בעוד 10 שניות, הוא כבר ממש קרוב להתעורר!";
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        function calcScore() {
            const m = Number(document.getElementById('magenScore').value);
            const e = Number(document.getElementById('examScore').value);
            if (!m || !e) return;
            const res = Math.round((m * 0.3) + (e * 0.7));
            document.getElementById('finalScoreResult').innerText = res;
        }

        let pomoActive = false;
        let pomoInterval;
        function togglePomo() {
            const btn = document.getElementById('pomoBtn');
            if (pomoActive) {
                clearInterval(pomoInterval);
                btn.innerText = "המשך";
                pomoActive = false;
            } else {
                let sec = 25 * 60;
                pomoInterval = setInterval(() => {
                    sec--;
                    let mins = Math.floor(sec / 60);
                    let secs = sec % 60;
                    document.getElementById('pomoDisplay').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                    if (sec <= 0) {
                        clearInterval(pomoInterval);
                        alert("זמן להפסקה!");
                    }
                }, 1000);
                btn.innerText = "עצור";
                pomoActive = true;
            }
        }

        function speakText() {
            const msg = new SpeechSynthesisUtterance(document.getElementById('summaryOutput').innerText);
            msg.lang = 'he-IL';
            window.speechSynthesis.speak(msg);
        }

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('summaryOutput').innerText);
            alert("הועתק!");
        }
    </script>
</body>
</html>
