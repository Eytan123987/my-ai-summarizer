<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudy | AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #summaryOutput { white-space: pre-wrap; line-height: 1.8; }
        .bold-text { font-weight: bold; color: #1e40af; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <nav class="bg-white shadow-sm p-4 mb-6">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-2xl font-bold text-blue-600">SmartStudy 🎓</h1>
            <span class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded">גרסה 2.5 PRO</span>
        </div>
    </nav>

    <main class="container mx-auto px-4 max-w-2xl">
        <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-100 mb-8">
            <textarea id="userInput" class="w-full h-40 p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition mb-4" placeholder="הדבק כאן טקסט מהשיעור..."></textarea>
            <button onclick="processAI()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition transform active:scale-95">
                צור סיכום ובוחן ✨
            </button>
        </div>

        <div id="resultArea" class="hidden space-y-4 pb-20">
            <div class="bg-white p-6 rounded-xl border-r-4 border-blue-500 shadow-md relative">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-xl text-blue-800">📝 התוצאה המוכנה:</h3>
                    <button onclick="copyText()" class="text-sm bg-slate-100 hover:bg-slate-200 px-3 py-1 rounded-md transition">העתק 📋</button>
                </div>
                <div id="summaryOutput" class="text-slate-700 text-lg"></div>
            </div>
        </div>
    </main>

    <script>
        async function processAI() {
            const textInput = document.getElementById('userInput').value;
            const resultArea = document.getElementById('resultArea');
            const summaryOutput = document.getElementById('summaryOutput');

            if (!textInput) return alert("נא להזין טקסט");

            resultArea.classList.remove('hidden');
            summaryOutput.innerHTML = `<div class="animate-pulse text-blue-500">ה-AI מנתח וכותב... רק רגע...</div>`;

            try {
                const response = await fetch('http://localhost:3000/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textInput })
                });

                const data = await response.json();
                
                // הפיכת כוכביות לטקסט מודגש (Bold)
                let formattedText = data.summary.replace(/\*\*(.*?)\*\*/g, '<span class="bold-text">$1</span>');
                summaryOutput.innerHTML = formattedText;
                
                // גלילה אוטומטית לתוצאה
                resultArea.scrollIntoView({ behavior: 'smooth' });
                
            } catch (error) {
                summaryOutput.innerText = "אופס! וודא שהשרת רץ ב-VS Code";
            }
        }

        function copyText() {
            const text = document.getElementById('summaryOutput').innerText;
            navigator.clipboard.writeText(text);
            alert("הסיכום הועתק!");
        }
    </script>
</body>
</html>
