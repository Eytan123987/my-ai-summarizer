<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudy | סיכום חכם ב-AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #summaryOutput { white-space: pre-wrap; line-height: 1.8; }
        .bold-text { font-weight: bold; color: #1e40af; }
        /* אנימציה קטנה לכפתור בזמן טעינה */
        .loading { opacity: 0.7; pointer-events: none; cursor: not-allowed; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <nav class="bg-white shadow-sm p-4 mb-6">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-2xl font-bold text-blue-600">SmartStudy 🎓</h1>
            <span class="text-xs bg-green-100 text-green-600 px-2 py-1 rounded font-medium">מחובר לענן 🚀</span>
        </div>
    </nav>

    <main class="container mx-auto px-4 max-w-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold mb-2 text-slate-800">העוזר הלימודי שלך</h2>
            <p class="text-slate-500">הדבק טקסט וקבל סיכום ובוחן בתוך שניות</p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-100 mb-8">
            <textarea id="userInput" class="w-full h-44 p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition mb-4" placeholder="הדבק כאן את החומר לסיכום..."></textarea>
            <button id="mainBtn" onclick="processAI()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition transform active:scale-95">
                צור סיכום ובוחן ✨
            </button>
        </div>

        <div id="resultArea" class="hidden space-y-4 pb-20">
            <div class="bg-white p-6 rounded-xl border-r-4 border-blue-500 shadow-md relative">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-xl text-blue-800">📝 הסיכום המוכן:</h3>
                    <button onclick="copyText()" class="text-sm bg-blue-50 text-blue-600 hover:bg-blue-100 px-3 py-1 rounded-md transition font-medium">העתק 📋</button>
                </div>
                <div id="summaryOutput" class="text-slate-700 text-lg"></div>
            </div>
        </div>
    </main>

    <script>
        async function processAI() {
            const textInput = document.getElementById('userInput').value;
            const resultArea = document.getElementById('resultArea');
            const summaryOutput = document.getElementById('summaryOutput');
            const btn = document.getElementById('mainBtn');

            if (!textInput) return alert("נא להזין טקסט");

            // מצב טעינה
            btn.classList.add('loading');
            btn.innerText = "ה-AI מתעורר (זה עשוי לקחת רגע)... ⏳";
            resultArea.classList.remove('hidden');
            summaryOutput.innerHTML = `<div class="text-blue-500 italic">מעבד את המידע בענן...</div>`;

            try {
                // הכתובת החדשה שלך ב-Render
                const response = await fetch('https://my-smart-study.onrender.com/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textInput })
                });

                const data = await response.json();
                
                // הפיכת כוכביות ל-Bold
                let formattedText = data.summary.replace(/\*\*(.*?)\*\*/g, '<span class="bold-text">$1</span>');
                summaryOutput.innerHTML = formattedText;
                
                resultArea.scrollIntoView({ behavior: 'smooth' });
                
            } catch (error) {
                console.error(error);
                summaryOutput.innerHTML = `<span class="text-red-500">שגיאה: השרת ב-Render עדיין מתעורר. נסה שוב בעוד 20 שניות.</span>`;
            } finally {
                btn.classList.remove('loading');
                btn.innerText = "צור סיכום ובוחן ✨";
            }
        }

        function copyText() {
            const text = document.getElementById('summaryOutput').innerText;
            navigator.clipboard.writeText(text);
            alert("הסיכום הועתק בהצלחה!");
        }
    </script>
</body>
</html>
