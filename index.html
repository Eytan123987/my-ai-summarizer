<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudy Bagrut ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Assistant', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .gradient-text { background: linear-gradient(90deg, #60a5fa, #2dd4bf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-dark { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; color: white; outline: none; }
        .input-dark:focus { border-color: #3b82f6; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 border-b border-white/5 flex justify-between items-center max-w-7xl mx-auto">
        <h1 class="text-3xl font-black gradient-text tracking-tighter">SmartStudy Pro</h1>
        <div id="userArea"></div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <aside class="lg:col-span-3 space-y-6">
            <div class="glass p-6 rounded-3xl border-blue-500/20">
                <h4 class="font-bold text-blue-400 mb-4 italic">📊 מחשבון ציון סופי</h4>
                <div class="space-y-3">
                    <div>
                        <label class="text-[10px] block text-slate-400">ציון הגשה (מגן):</label>
                        <input type="number" id="magenScore" class="input-dark w-full text-center" placeholder="0-100">
                    </div>
                    <div>
                        <label class="text-[10px] block text-slate-400">ציון בחינה:</label>
                        <input type="number" id="examScore" class="input-dark w-full text-center" placeholder="0-100">
                    </div>
                    <button onclick="calcScore()" class="w-full bg-blue-600/20 text-blue-400 py-2 rounded-xl font-bold border border-blue-500/30">חשב ציון סופי</button>
                    <div id="finalScoreResult" class="text-center font-black text-2xl text-white mt-2"></div>
                </div>
            </div>

            <div class="glass p-6 rounded-3xl border-yellow-500/20 text-center">
                <p class="text-xs text-yellow-500 font-bold mb-2">טיימר פומודורו ⏳</p>
                <div id="pomoDisplay" class="text-3xl font-black mb-2">25:00</div>
                <button onclick="startPomo()" class="bg-yellow-500 text-black px-4 py-1 rounded-full text-xs font-bold">הפעל</button>
            </div>
        </aside>

        <div class="lg:col-span-9 space-y-6">
            <section id="appBox" class="glass p-8 rounded-[2.5rem] relative overflow-hidden border-white/10 shadow-2xl">
                <div id="lockOverlay" class="absolute inset-0 z-50 flex items-center justify-center bg-slate-950/95 backdrop-blur-xl rounded-[2.5rem]">
                    <button onclick="login()" class="bg-blue-600 px-12 py-4 rounded-2xl font-black text-xl shadow-2xl hover:scale-105 transition">התחבר עם Google</button>
                </div>

                <div class="flex justify-between items-center mb-6">
                    <span class="text-xs font-bold text-slate-500">SYSTEM: UNLIMITED ACCESS</span>
                    <div id="statusPulse" class="flex items-center gap-2 text-[10px] text-green-500 font-bold uppercase">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span> שרת פעיל
                    </div>
                </div>

                <textarea id="userInput" class="w-full h-72 bg-white/5 border border-white/10 rounded-3xl p-6 text-white text-lg focus:border-blue-500 outline-none transition-all mb-6 resize-none" placeholder="הדבק כאן את החומר לבגרות..."></textarea>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button id="mainBtn" onclick="processAI('summary')" class="bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl text-xl transition-all">סכם לי הכל ✨</button>
                    <button id="quizBtn" onclick="processAI('quiz')" class="bg-slate-800 hover:bg-slate-700 text-white font-black py-5 rounded-2xl text-xl border border-white/10 transition-all">צור שאלות תרגול ✍️</button>
                </div>
            </section>

            <div id="resultArea" class="hidden glass p-8 rounded-[2.5rem] border-r-8 border-blue-500 relative">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-black text-blue-400 italic">התוצאה המוכנה:</h3>
                    <div class="flex gap-4">
                        <button onclick="speakText()" class="text-2xl">🔊</button>
                        <button onclick="copyText()" class="text-2xl">📋</button>
                    </div>
                </div>
                <div id="summaryOutput" class="text-slate-200 text-lg leading-relaxed"></div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABZLTWaBJ6-i3cMQ7m9z5NavlSPjcfjDE",
            authDomain: "smartstudy-445f5.firebaseapp.com",
            projectId: "smartstudy-445f5",
            storageBucket: "smartstudy-445f5.firebasestorage.app",
            messagingSenderId: "970794059408",
            appId: "1:970794059408:web:9ba84746eedaf761f73a15"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        function login() { auth.signInWithPopup(provider); }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            const overlay = document.getElementById('lockOverlay');
            const userArea = document.getElementById('userArea');
            if (user) {
                overlay.classList.add('hidden');
                userArea.innerHTML = `<div class="flex items-center gap-3 bg-white/5 p-1 pr-4 rounded-full border border-white/10"><span class="text-sm font-bold text-blue-400">${user.displayName.split(' ')[0]}</span><img src="${user.photoURL}" class="w-8 h-8 rounded-full border border-blue-500"><button onclick="logout()" class="text-xs text-slate-500 px-2">צא</button></div>`;
            } else {
                overlay.classList.remove('hidden');
                userArea.innerHTML = `<button onclick="login()" class="bg-blue-600 px-6 py-2 rounded-full font-bold">כניסה</button>`;
            }
        });

        // פונקציית הקסם - מנסה שוב ושוב עד שהשרת מתעורר
        async function fetchWithRetry(url, options, maxRetries = 3) {
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                    console.log("השרת מתעורר... מנסה שוב...");
                    await new Promise(res => setTimeout(res, 5000)); // מחכה 5 שניות בין ניסיונות
                }
            }
        }

        async function processAI(mode) {
            const text = document.getElementById('userInput').value;
            if (!text) return alert("הזן טקסט");
            const btn = document.getElementById('mainBtn');
            const output = document.getElementById('summaryOutput');
            const resultArea = document.getElementById('resultArea');

            btn.disabled = true;
            btn.innerText = "ה-AI מתעורר... שניה וזה מוכן ✨";
            resultArea.classList.remove('hidden');
            output.innerHTML = "אנחנו מעירים את השרת בשבילך. בבקשה אל תרענן את הדף...";

            try {
                const data = await fetchWithRetry('https://my-smart-study.onrender.com/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, mode: mode })
                });

                let formatted = data.summary.replace(/\*\*(.*?)\*\*/g, '<b class="text-blue-400 font-black">$1</b>');
                output.innerHTML = formatted.replace(/\n/g, '<br>');
                resultArea.scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                output.innerHTML = "אוף, השרת עדיין ישן עמוק. נסה ללחוץ שוב בעוד 10 שניות.";
            } finally {
                btn.disabled = false;
                btn.innerText = "סכם לי הכל ✨";
            }
        }

        function calcScore() {
            const magen = Number(document.getElementById('magenScore').value);
            const exam = Number(document.getElementById('examScore').value);
            if (!magen || !exam) return alert("מלא את שני הציונים");
            const final = Math.round((magen * 0.3) + (exam * 0.7)); // חישוב לפי 30/70
            document.getElementById('finalScoreResult').innerText = final;
        }

        let pomoInt;
        function startPomo() {
            let sec = 25 * 60;
            if (pomoInt) clearInterval(pomoInt);
            pomoInt = setInterval(() => {
                let m = Math.floor(sec / 60);
                let s = sec % 60;
                document.getElementById('pomoDisplay').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (sec <= 0) clearInterval(pomoInt);
                sec--;
            }, 1000);
        }

        function speakText() {
            const msg = new SpeechSynthesisUtterance(document.getElementById('summaryOutput').innerText);
            msg.lang = 'he-IL';
            window.speechSynthesis.speak(msg);
        }

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('summaryOutput').innerText);
            alert("הועתק!");
        }
    </script>
</body>
</html>
